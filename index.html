<!DOCTYPE html>\n<html lang=
"en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Quiz</title>\n    <script>\n        let sessionCounter = 0;\n\n        async function incrementSessionCounter() {\n            const response = await fetch('https://YOURSITE-service.onrender.com/api/quiz-start');\n            if (response.ok) {\n                sessionCounter++;\n                document.getElementById('sessionCount').innerText = sessionCounter;\n            } else {\n                console.error('Failed to increment session counter.');\n            }\n        }\n\n        window.onload = function() {\n            const userName = 'User'; // Replace with dynamic user name as needed\n            incrementSessionCounter();\n            document.getElementById('user').innerText = userName + ' (Sessions: ' + sessionCounter + ')';\n        };\n    <\/script>\n</head>\n<body>\n    <h1>Welcome to the Quiz</h1>\n    <p id="user">User (Sessions: 0)</p>\n    <div id="sessionCount">0</div>\n</body>\n</html>
